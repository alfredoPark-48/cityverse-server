<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityVerse Traffic Simulation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e1a;
            color: #e0e6ed;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #00b4d8, #06d6a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 13px;
            color: #5a6a80;
        }

        /* Controls */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover { transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .btn-step {
            background: linear-gradient(135deg, #0077b6, #00b4d8);
            color: white;
        }

        .btn-play {
            background: linear-gradient(135deg, #059669, #06d6a0);
            color: white;
        }

        .btn-pause {
            background: linear-gradient(135deg, #d97706, #fbbf24);
            color: #1a1a2e;
        }

        .btn-reset {
            background: linear-gradient(135deg, #dc2626, #f87171);
            color: white;
        }

        .btn.active {
            box-shadow: 0 0 12px rgba(6, 214, 160, 0.5);
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #111827;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            color: #8892a4;
        }

        .speed-control input[type="range"] {
            width: 100px;
            accent-color: #06d6a0;
        }

        .speed-val {
            color: #06d6a0;
            font-weight: 600;
            min-width: 40px;
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #111827, #1a2332);
            border: 1px solid #1e293b;
            border-radius: 10px;
            padding: 14px;
            text-align: center;
        }

        .stat-card .stat-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .stat-card .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
        }

        .stat-card .stat-label {
            font-size: 11px;
            color: #5a6a80;
            margin-top: 2px;
        }

        /* Grid */
        .grid-wrapper {
            display: flex;
            justify-content: center;
            overflow: auto;
            padding: 16px;
            background: linear-gradient(135deg, #0d1117, #111827);
            border: 1px solid #1e293b;
            border-radius: 12px;
        }

        .grid-container {
            display: grid;
            gap: 1px;
            background: #0a0e1a;
        }

        .cell {
            width: 22px;
            height: 22px;
            border-radius: 2px;
            transition: background-color 0.15s ease;
            position: relative;
        }

        /* Cell type colors */
        .cell-grass     { background: #0d1f12; }
        .cell-sidewalk  { background: #1e293b; }
        .cell-road      { background: #2b2d42; }
        .cell-crosswalk { background: #374151; border: 1px dashed #4b5563; }
        .cell-building  { background: #374151; border: 1px solid #4b5563; }
        .cell-roundabout { background: #4a3728; border-radius: 50%; }
        .cell-parking   { background: #1e3a5f; }
        .cell-traffic-light { background: #2b2d42; }

        /* Traffic light states */
        .cell-light-red    { box-shadow: inset 0 0 8px #ef4444, 0 0 4px #ef4444; }
        .cell-light-yellow { box-shadow: inset 0 0 8px #eab308, 0 0 4px #eab308; }
        .cell-light-green  { box-shadow: inset 0 0 8px #22c55e, 0 0 4px #22c55e; }

        /* Agents on top of cells */
        .cell-car {
            background: #00b4d8 !important;
            box-shadow: 0 0 8px rgba(0, 180, 216, 0.7);
            border-radius: 3px;
        }

        .cell-car-parked {
            background: #0077b6 !important;
            box-shadow: 0 0 4px rgba(0, 119, 182, 0.5);
            border-radius: 3px;
        }

        .cell-car-waiting {
            background: #f59e0b !important;
            box-shadow: 0 0 8px rgba(245, 158, 11, 0.6);
            border-radius: 3px;
        }

        .cell-ped {
            background: #06d6a0 !important;
            box-shadow: 0 0 8px rgba(6, 214, 160, 0.7);
            border-radius: 50%;
        }

        .cell-ped-waiting {
            background: #f97316 !important;
            box-shadow: 0 0 6px rgba(249, 115, 22, 0.6);
            border-radius: 50%;
        }

        /* Legend */
        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-top: 16px;
            font-size: 11px;
            color: #8892a4;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-swatch {
            width: 14px;
            height: 14px;
            border-radius: 3px;
        }

        .legend-swatch.round { border-radius: 50%; }

        /* Tooltip */
        .cell[title] { cursor: crosshair; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>🚦 CityVerse Traffic Simulation</h1>
            <p>Agent-based city traffic simulation powered by Mesa</p>
        </div>

        <div class="controls">
            <button class="btn btn-step" id="stepBtn">▶ Step</button>
            <button class="btn btn-play" id="playBtn">⏵ Play</button>
            <button class="btn btn-pause" id="pauseBtn">⏸ Pause</button>
            <button class="btn btn-reset" id="resetBtn">🔄 Reset</button>
            <div class="speed-control">
                <span>Speed:</span>
                <input type="range" id="speed" min="50" max="1000" value="300" step="50">
                <span class="speed-val" id="speedVal">300ms</span>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-icon">⏱️</div>
                <div class="stat-value" id="tickCount">0</div>
                <div class="stat-label">Tick</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🚗</div>
                <div class="stat-value" id="carCount">0</div>
                <div class="stat-label">Active Cars</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🅿️</div>
                <div class="stat-value" id="parkedCount">0</div>
                <div class="stat-label">Parked</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🚶</div>
                <div class="stat-value" id="pedCount">0</div>
                <div class="stat-label">Pedestrians</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏳</div>
                <div class="stat-value" id="waitingCount">0</div>
                <div class="stat-label">Waiting</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🚦</div>
                <div class="stat-value" id="lightCount">0</div>
                <div class="stat-label">Traffic Lights</div>
            </div>
        </div>

        <div class="grid-wrapper">
            <div class="grid-container" id="grid"></div>
        </div>

        <div class="legend">
            <div class="legend-item"><div class="legend-swatch" style="background:#00b4d8;"></div> Car (moving)</div>
            <div class="legend-item"><div class="legend-swatch" style="background:#0077b6;"></div> Car (parked)</div>
            <div class="legend-item"><div class="legend-swatch" style="background:#f59e0b;"></div> Car (waiting)</div>
            <div class="legend-item"><div class="legend-swatch round" style="background:#06d6a0;"></div> Pedestrian</div>
            <div class="legend-item"><div class="legend-swatch round" style="background:#f97316;"></div> Ped (waiting)</div>
            <div class="legend-item"><div class="legend-swatch" style="background:#2b2d42;"></div> Road</div>
            <div class="legend-item"><div class="legend-swatch" style="background:#374151; border:1px solid #4b5563;"></div> Building</div>
            <div class="legend-item"><div class="legend-swatch" style="background:#4a3728; border-radius:50%;"></div> Roundabout</div>
        </div>
    </div>

    <script>
        // Use relative URL when served from the same origin (Docker), or set manually for CORS
        const API_URL = window.location.origin;
        let playing = false;
        let speed = 300;
        let loopTimer = null;

        // Cache char→class mapping
        const CHAR_CLASS = {
            '.': 'cell-grass',
            's': 'cell-sidewalk',
            'v': 'cell-road', '^': 'cell-road', '>': 'cell-road', '<': 'cell-road',
            'c': 'cell-crosswalk',
            'B': 'cell-building',
            'O': 'cell-roundabout',
            'P': 'cell-parking',
            'D': 'cell-traffic-light', 'U': 'cell-traffic-light',
            'R': 'cell-traffic-light', 'L': 'cell-traffic-light',
            '#': 'cell-grass',
        };

        async function apiGet(path) {
            const r = await fetch(`${API_URL}${path}`);
            return r.json();
        }

        async function apiPost(path) {
            const r = await fetch(`${API_URL}${path}`, { method: 'POST' });
            return r.json();
        }

        async function doStep() {
            const state = await apiGet('/step');
            renderState(state);
            const stats = await apiGet('/stats');
            renderStats(stats);
        }

        async function doReset() {
            stopPlaying();
            const state = await apiPost('/reset');
            renderState(state);
            const stats = await apiGet('/stats');
            renderStats(stats);
        }

        function renderState(state) {
            const { grid, grid_width, grid_height, agents, traffic_lights, tick } = state;
            const container = document.getElementById('grid');
            container.style.gridTemplateColumns = `repeat(${grid_width}, 22px)`;

            // Build lookup maps for agents and lights
            const agentMap = {};
            for (const a of agents) {
                const key = `${a.x},${a.y}`;
                agentMap[key] = a;
            }

            const lightMap = {};
            for (const tl of traffic_lights) {
                lightMap[`${tl.x},${tl.y}`] = tl;
            }

            // Render grid cells
            const cells = [];
            for (let y = 0; y < grid_height; y++) {
                for (let x = 0; x < grid_width; x++) {
                    const ch = grid[y][x];
                    const key = `${x},${y}`;
                    const agent = agentMap[key];
                    const light = lightMap[key];

                    let cls = 'cell ' + (CHAR_CLASS[ch] || 'cell-grass');
                    let title = `(${x},${y}) ${ch}`;

                    // Agent overlay
                    if (agent) {
                        if (agent.type === 'CarAgent') {
                            if (agent.parked) cls = 'cell cell-car-parked';
                            else if (agent.waiting) cls = 'cell cell-car-waiting';
                            else cls = 'cell cell-car';
                            title += ` | Car #${agent.id}${agent.parked ? ' [PARKED]' : ''}${agent.waiting ? ' [WAITING]' : ''}`;
                        } else if (agent.type === 'PedestrianAgent') {
                            if (agent.waiting) cls = 'cell cell-ped-waiting';
                            else cls = 'cell cell-ped';
                            title += ` | Ped #${agent.id}${agent.crossing ? ' [CROSSING]' : ''}`;
                        }
                    }
                    // Traffic light glow
                    else if (light) {
                        cls += ` cell-light-${light.state}`;
                        title += ` | 🚦 ${light.state.toUpperCase()} (${light.timer})`;
                    }

                    cells.push(`<div class="${cls}" title="${title}"></div>`);
                }
            }
            container.innerHTML = cells.join('');

            document.getElementById('tickCount').textContent = tick;
        }

        function renderStats(stats) {
            document.getElementById('tickCount').textContent = stats.tick;
            document.getElementById('carCount').textContent = stats.active_cars;
            document.getElementById('parkedCount').textContent = stats.parked_cars;
            document.getElementById('pedCount').textContent = stats.active_pedestrians;
            document.getElementById('waitingCount').textContent = stats.waiting_cars + stats.waiting_pedestrians;
            document.getElementById('lightCount').textContent = stats.total_traffic_lights;
        }

        function startPlaying() {
            playing = true;
            document.getElementById('playBtn').classList.add('active');
            playLoop();
        }

        function stopPlaying() {
            playing = false;
            document.getElementById('playBtn').classList.remove('active');
            if (loopTimer) { clearTimeout(loopTimer); loopTimer = null; }
        }

        async function playLoop() {
            if (!playing) return;
            await doStep();
            loopTimer = setTimeout(playLoop, speed);
        }

        // Event listeners
        document.getElementById('stepBtn').addEventListener('click', async () => {
            stopPlaying();
            await doStep();
        });

        document.getElementById('playBtn').addEventListener('click', () => {
            if (playing) { stopPlaying(); } else { startPlaying(); }
        });

        document.getElementById('pauseBtn').addEventListener('click', stopPlaying);
        document.getElementById('resetBtn').addEventListener('click', doReset);

        document.getElementById('speed').addEventListener('input', (e) => {
            speed = parseInt(e.target.value);
            document.getElementById('speedVal').textContent = speed + 'ms';
        });

        // Initial render
        (async () => {
            try {
                const state = await apiGet('/state');
                renderState(state);
                const stats = await apiGet('/stats');
                renderStats(stats);
            } catch (e) {
                document.getElementById('grid').innerHTML =
                    '<p style="color:#f87171; padding:20px;">Could not connect to API. Is the backend running?</p>';
            }
        })();
    </script>
</body>
</html>
