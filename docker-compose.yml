services:
  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt && 
             uvicorn src.infrastructure.api.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      - GRID_FILE=data/city.txt
      - TICKS_PER_SECOND=10
      - MAX_CARS=50
      - MAX_PEDESTRIANS=100
    restart: on-failure
